# Изолированная группа стека Moment Predictor (имя проекта + именованная сеть).
# Порты на хосте (по вашему диапазону):
#   8118 — статика + прокси /api, /health, /docs
#   8119 — FastAPI напрямую (доки, Postman)
# Зарезервировано под расширение (БД, очереди): 8117, 8116 — не заняты этим compose.
#
# Запуск из корня репозитория:
#   docker compose -f docker/docker-compose.yml up --build -d
#
name: moment-predictor

networks:
  moment_predictor_net:
    name: moment_predictor_net
    driver: bridge

services:
  moment-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: moment-predictor-api
    networks:
      - moment_predictor_net
    ports:
      - "8119:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: sqlite:////app/data/moment.db
    volumes:
      - moment_predictor_sqlite:/app/data
    restart: unless-stopped

  moment-web:
    image: nginx:1.27-alpine
    container_name: moment-predictor-web
    networks:
      - moment_predictor_net
    ports:
      - "8118:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/api-config.js:/usr/share/nginx/html/api-config.js:ro
    depends_on:
      - moment-api
    restart: unless-stopped

volumes:
  moment_predictor_sqlite:
    name: moment_predictor_sqlite
